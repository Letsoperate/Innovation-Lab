services:
  postgres:
    image: postgres:16-alpine
    container_name: innovationlab-db
    environment:
      POSTGRES_DB: innovationlab
      POSTGRES_USER: innovationlab
      POSTGRES_PASSWORD: innovationlab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovationlab -d innovationlab"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: innovationlab-api
    ports:
      - "8181:8080"
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/innovationlab
      DATASOURCE_USER: innovationlab
      DATASOURCE_PASSWORD: innovationlab
      JWT_SECRET: change-me-in-production-use-256-bit-key
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
