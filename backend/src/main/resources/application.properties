server.port=${PORT:8181}

# Database  - Render auto-injects DATABASE_URL. Local uses defaults.
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:innovationlab}}
spring.datasource.username=${DATASOURCE_USER:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars!!}
app.jwt.expiration-hours=72

# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Competition
app.competition.end-date=${COMPETITION_END:2026-08-15}

# JSON naming - serialize camelCase Java fields as snake_case JSON
spring.jackson.property-naming-strategy=SNAKE_CASE

# GitHub OAuth
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}
