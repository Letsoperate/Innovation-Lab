<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Innovation Lab — Where South Africa's builders compete, collaborate, and create." />
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
        <title>Innovation Lab — Build. Compete. Innovate.</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);
        document.addEventListener("contextmenu", function(e) { e.preventDefault(); return false; });
        document.addEventListener("selectstart", function(e) { e.preventDefault(); return false; });
        document.addEventListener("dragstart", function(e) { e.preventDefault(); return false; });
        document.addEventListener("copy", function(e) { e.preventDefault(); return false; });
        document.addEventListener("cut", function(e) { e.preventDefault(); return false; });
        document.onkeydown = function(e) {
          if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 67)) return false;
          if (e.keyCode === 123) return false;
          if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) return false;
        };
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
