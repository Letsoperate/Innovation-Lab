server.port=${PORT:8080}

# Database from Render's auto-generated DATABASE_URL
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/innovationlab}
spring.datasource.username=${DATASOURCE_USER:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars!!}
app.jwt.expiration-hours=72

# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Competition
app.competition.end-date=${COMPETITION_END:2026-08-15}

# JSON naming
spring.jackson.property-naming-strategy=SNAKE_CASE
